<!DOCTYPE html>

<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Mes patients</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}"
	rel="stylesheet">

</head>

<body class="bg-light">

	<div th:replace="~{fragments/header :: header}"></div>
	<div class="container mt-5">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">

				<h2 class="mb-4 text-center">Liste des patients</h2>
				<div class="d-flex justify-content-end">
					<a type="button" class="btn btn-success btn-sm "
						th:href="@{/patient/nouveau}"> Ajouter 
						<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill-add" viewBox="0 0 16 16">
							<path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 0 1-1 0v-1h-1a.5.5 0 0 1 0-1h1v-1a.5.5 0 0 1 1 0m-2-6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
							<path d="M2 13c0 1 1 1 1 1h5.256A4.5 4.5 0 0 1 8 12.5a4.5 4.5 0 0 1 1.544-3.393Q8.844 9.002 8 9c-5 0-6 3-6 4" />
						</svg>
					</a>
				</div>

				<table class="table table-sm align-middle">
					<thead>
						<tr>
							<th scope="col">Nom</th>
							<th scope="col">Prénom</th>
							<th scope="col">Date de naissance</th>
							<th scope="col" style="width: 1%; white-space: nowrap;"></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each=" p : ${patients}">
							<td th:text="${p.name}"></td>
							<td th:text="${p.lastname}"></td>
							<td th:text="${#dates.format(p.birthdate, 'dd/MM/yyyy')}"></td>
							<td class="text-end"><a class="btn btn-outline-primary"
								th:href="@{/patient/{id}(id=${p.id})}">Consulter</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
