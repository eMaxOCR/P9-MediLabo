<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Mes patients</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}"
	rel="stylesheet">
</head>

<body class="bg-light">

	<div th:replace="~{fragments/header :: header}"></div>

	<div class="container mt-5">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">
				<h2 class="mb-5 text-center">Fiche patient</h2>


				<div class="d-flex border-bottom border-top mb-5 align-items-center">
					<h5 class="mb-0 me-3">Analyse :</h5>
					<input class="form-control-plaintext w-auto fw-bold" type="text"
						value="Risque élevé" readonly>
				</div>

				<form
					th:action="${isNew} ? @{/patient} : @{/patient/{id}(id=${patient.id})}"
					th:object="${patient}" method="post">


					<input type="hidden" th:if="${!isNew}" th:field="*{id}">

					<div class="row g-3">

						<div class="col-md-6 mb-3">
							<label class="form-label">Prénom</label> <input type="text"
								class="form-control" th:field="*{name}" required>
						</div>
						<div class="col-md-6 mb-3">
							<label class="form-label">Nom</label> <input type="text"
								class="form-control" th:field="*{lastname}" required>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label">Date de naissance</label> <input
								type="date" class="form-control" th:field="*{birthdate}"
								required>
						</div>
						<div class="col-md-6 mb-3">
							<label class="form-label">Genre</label> <select
								class="form-select" th:field="*{genre}">
								<option value="M">Masculin</option>
								<option value="F">Féminin</option>
							</select>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label">Téléphone</label> <input type="tel"
								class="form-control" th:field="*{phoneNumber}"
								placeholder="100-222-3333">
						</div>

						<div class="col-md-12 mb-3">
							<label class="form-label">Adresse</label>
							<textarea class="form-control" th:field="*{address}" rows="2"></textarea>
						</div>

					</div>
					<div class="text-center mt-4">
						<button type="submit" class="btn btn-primary"
							th:text="${isNew} ? 'Créer' : 'Mettre à jour'"></button>
						<a th:href="@{/patient}" class="btn btn-outline-secondary">Annuler</a>
					</div>
				</form>

			</div>
		</div>

		<div class="card shadow-sm border-0 mt-5">
			<div class="card-body p-4">

				<p class="text-center text-muted"
					th:if="${notes == null or notes.isEmpty()}">ℹ️ Aucune note pour
					ce patient</p>
				<div class="d-flex justify-content-between align-items-center mb-3">
					<a class="btn btn-success btn-sm"
						th:href="@{/note/ajouter(patientId=${patient.id})}"
						th:if="${!isNew}"> + Ajouter une note </a>
				</div>
				<table class="table table-sm align-middle"
					th:unless="${#lists.isEmpty(notes)}">
					<thead>
						<tr>
							<th scope="col">Notes</th>
							<th scope="col" style="width: 1%; white-space: nowrap;"></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each=" p : ${notes}">
							<td th:text="${p.note}"></td>
							<td class="text-end"><a class="btn btn-outline-primary"
								th:href="@{/note/{id}(id=${p.id})}">Consulter</a></td>
						</tr>
					</tbody>
				</table>

			</div>
		</div>

		<form th:if="${!isNew}"
			th:action="@{/patient/delete/{id}(id=${patient.id})}" method="post"
			class="mt-3 text-end">
			<button type="submit" class="btn btn-outline-danger btn-sm"
				onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce patient ?');">
				Supprimer ce patient</button>
		</form>
	</div>

	<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
